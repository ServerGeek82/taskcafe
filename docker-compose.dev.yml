version: "3"
services:
  postgres:
    image: postgres:15-alpine
    restart: always
    networks:
      - taskcafe-net
    environment:
      POSTGRES_USER: taskcafe
      POSTGRES_PASSWORD: taskcafe_test
      POSTGRES_DB: taskcafe
    volumes:
      - taskcafe-postgres:/var/lib/postgresql/data
    ports:
      - "8865:5432"

  mailhog:
    image: mailhog/mailhog:latest
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - taskcafe-redis:/data

volumes:
  taskcafe-postgres:
    external: false
  taskcafe-redis:
    external: false

networks:
  taskcafe-net:
    driver: bridge
